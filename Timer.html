<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Study Timer | Virtual Study App</title>
    <link rel="stylesheet" href="timer.css">
    <link rel="stylesheet" href="./css/style.css">
    <script src="timer.js"></script>

</head>
<body>

<!-- HEADER -->
<header class="header">
    <div class="logo">VirtualStudy</div>

    <nav class="nav">
        <a href="./dashboard.html">Home</a>
        <a href="subjects.html">Subjects</a>
        <a href="timer.html">Study Timer</a>
        <a href="notes.html">Notes</a>
        <a href="index.html" class="btn-login">Logout</a>
    </nav>
</header>

<!-- HERO -->
<section class="timer-hero">
    <h1>Study Timer</h1>
    <p>Stay focused. Track your study time effectively.</p>
</section>

<!-- TIMER CARD -->
<section class="timer-section">

    <div class="timer-card">
        <h3>Focus Session</h3>

        <div class="time-display">
            25 : 00
        </div>

        <div class="timer-buttons">
            <button class="start">Start</button>
            <button class="pause">Pause</button>
            <button class="reset">Reset</button>
        </div>

        <p class="info">
            Use this timer to concentrate on your studies without distractions.
        </p>
    </div>

</section>

<!-- FOOTER -->
<footer class="footer">
    <p>© 2026 Virtual Study App | College Project</p>
</footer>

<script>

let minutes = 25;
let seconds = 0;
let timer = null;
let isRunning = false;

// Update timer display
function updateDisplay() {
    const min = minutes < 10 ? "0" + minutes : minutes;
    const sec = seconds < 10 ? "0" + seconds : seconds;
    document.querySelector(".time-display").innerText = `${min} : ${sec}`;
}

// Start timer
function startTimer() {
    if (isRunning) return;

    isRunning = true;
    timer = setInterval(() => {
        if (seconds === 0) {
            if (minutes === 0) {
                clearInterval(timer);
                isRunning = false;
                alert("Study session completed!");
                return;
            }
            minutes--;
            seconds = 59;
        } else {
            seconds--;
        }
        updateDisplay();
    }, 1000);
}

// Pause timer
function pauseTimer() {
    clearInterval(timer);
    isRunning = false;
}

// Reset timer
function resetTimer() {
    clearInterval(timer);
    minutes = 25;
    seconds = 0;
    isRunning = false;
    updateDisplay();
}

// Button events
document.querySelector(".start").addEventListener("click", startTimer);
document.querySelector(".pause").addEventListener("click", pauseTimer);
document.querySelector(".reset").addEventListener("click", resetTimer);

// Initial display
updateDisplay();

</script>

</body>
</html>
