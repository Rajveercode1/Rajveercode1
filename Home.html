<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - Virtual Study</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#1d2671,#c33764);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
width:350px;
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
text-align:center;
}

.login-box h2{
margin-bottom:25px;
}

.login-box input{
width:100%;
padding:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
}

.login-box button{
width:100%;
padding:12px;
background:#1d2671;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

.login-box button:hover{
background:#11165a;
}

.login-box a{
display:block;
margin-top:15px;
text-decoration:none;
color:#c33764;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Login</h2>

<form>

<input type="text" placeholder="Username" required>

<input type="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<a href="register.html">Create New Account</a>

</div>

</body>
</html>
