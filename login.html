<!DOCTYPE html>
<html>
<head>
    <title>Virtual Study Platform - Login</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<atyle>
    
</atyle>

<body>

<div class="login-container">

    <div class="login-box">

        <h1>Virtual Study Platform</h1>
        <h3>Student Login</h3>

        <input type="text" placeholder="Enter Username">

        <input type="password" placeholder="Enter Password">

        <a href="./dashboard.html">
            <button>Login</button>
            </a>

        <p>New Student? <a href="register.html">Register Here</a></p>

    </div>

</div>

</body>
</html>


<style>
    *{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

body{
height:100vh;
background: linear-gradient(135deg,#4facfe,#00f2fe);
display:flex;
justify-content:center;
align-items:center;
}

.login-container{
width:100%;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:white;
padding:40px;
width:350px;
border-radius:10px;
box-shadow:0px 5px 20px rgba(0,0,0,0.2);
text-align:center;
}

.login-box h1{
color:#333;
margin-bottom:10px;
}

.login-box h3{
margin-bottom:25px;
color:#666;
}

.login-box input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
font-size:15px;
}

.login-box input:focus{
border-color:#4facfe;
outline:none;
}

.login-box button{
width:100%;
padding:12px;
margin-top:10px;
background:#4facfe;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
transition:0.3s;
}

.login-box button:hover{
background:#2f8cff;
}

.login-box p{
margin-top:15px;
font-size:14px;
}

.login-box a{
color:#4facfe;
text-decoration:none;
font-weight:bold;
}
</style>
